<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeeJay Home of Poetry — Dark Theme</title>
  <meta name="description" content="A dark, cinematic poetry theme with a library, editor, and export-to-image." />
  <link rel="stylesheet" href="./css/style.css" />

  <!-- Export to image tool (CDN) -->
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</head>

<body>
  <div class="bg">
    <div class="grain"></div>
    <div class="orbs">
      <span class="orb o1"></span>
      <span class="orb o2"></span>
      <span class="orb o3"></span>
    </div>
  </div>

  <header class="topbar">
    <a class="brand" href="#/">
      <span class="brandMark">V7</span>
      <span class="brandText">VeeJay Home of Poetry</span>
    </a>

    <nav class="nav">
      <a href="#/" data-nav>Home</a>
      <a href="#/library" data-nav>Library</a>
      <a href="#/editor" data-nav>Editor</a>
    </nav>

    <button class="btn ghost" id="themeToggle" title="Toggle mood">
      <span class="icon">◐</span>
      <span class="hideSm">Mood</span>
    </button>
  </header>

  <main class="shell">
    <div id="app" class="app"></div>
  </main>

  <footer class="footer">
    <div>Built locally → deployed on GitHub Pages.</div>
    <div class="muted">© <span id="year"></span> Velaphi7</div>
  </footer>

  <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
